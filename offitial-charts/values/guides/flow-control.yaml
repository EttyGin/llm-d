## Flow Control (standalone) — router values.
##
## Mirrors guides/flow-control/router/flow-control.values.yaml + objectives.yaml,
## nested under `llmd:`. This is the NON-precise flow-control guide (generic
## prefix-cache-scorer, no KV-events producer). For precise prefix routing WITH
## flow control, use values/guides/precise-prefix-cache-flowcontrol.yaml instead.
##
## Layer on top of: values/base.values.yaml
##
## Difference from upstream: the upstream file adds a `metrics` port on 9090 in
## extraServicePorts. Router chart v0.9.0 already exposes http-metrics on 9090
## unconditionally, so adding it again makes the Service invalid — omitted here.

llmd:
  router:
    epp:
      pluginsConfigFile: "custom-plugins.yaml"
      pluginsCustomConfig:
        custom-plugins.yaml: |
          apiVersion: llm-d.ai/v1alpha1
          kind: EndpointPickerConfig
          featureGates:
          - flowControl
          plugins:
          - type: queue-scorer
          - type: kv-cache-utilization-scorer
          - type: prefix-cache-scorer
          - type: round-robin-fairness-policy
          - type: fcfs-ordering-policy
          - type: concurrency-detector
            parameters:
              maxConcurrency: 132
              concurrencyMode: requests
              headroom: 0.0
          schedulingProfiles:
          - name: default
            plugins:
            - pluginRef: queue-scorer
              weight: 2
            - pluginRef: kv-cache-utilization-scorer
              weight: 2
            - pluginRef: prefix-cache-scorer
              weight: 3
          flowControl:
            # No shedding: every request queues until backend capacity frees up,
            # nothing is rejected with 429. maxRequests: 0 = unlimited (count),
            # defaultRequestTTL: "0s" = wait for the client deadline (no TTL-based
            # 503). maxBytes stays as an EPP-memory OOM guardrail only. Priority
            # still orders dispatch OUT of the queue — prioritisation without
            # load-shedding. Defaults per configuration.md (maxBytes/maxRequests
            # 0 = unlimited, TTL 0s = client context deadline).
            maxBytes: "10Gi"
            maxRequests: 0
            defaultRequestTTL: "0s"
            saturationDetector:
              pluginRef: concurrency-detector
            priorityBands:
            - priority: 100
              maxRequests: 0
              fairnessPolicyRef: round-robin-fairness-policy
              orderingPolicyRef: fcfs-ordering-policy
            - priority: 0
              maxRequests: 0
              fairnessPolicyRef: round-robin-fairness-policy
              orderingPolicyRef: fcfs-ordering-policy
            - priority: -10
              maxRequests: 0
              fairnessPolicyRef: round-robin-fairness-policy
              orderingPolicyRef: fcfs-ordering-policy

    inferenceObjectives:
      - name: premium-traffic
        priority: 100
      - name: standard-traffic
        priority: 0
      - name: best-effort-traffic
        priority: -10

    modelServers:
      matchLabels:
        llm-d.ai/guide: "flow-control"

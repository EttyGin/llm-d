## Precise Prefix Cache Routing — router values.
##
## VERBATIM copy of the upstream guide file
##   guides/precise-prefix-cache-routing/router/precise-prefix-cache-routing.values.yaml
## with its top-level `router:` block nested under `llmd:` (the OCI subchart
## alias). To update on a new release, re-copy that file and re-nest it — no
## chart templating is involved.
##
## Layer on top of: values/base.values.yaml
## For flow control too, use values/guides/precise-prefix-cache-flowcontrol.yaml
## instead of this file (a single combined EPP config — see the note there).

llmd:
  router:
    epp:
      replicas: 2
      flags:
        ha-enable-leader-election: false
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN

      pluginsConfigFile: "precise-prefix-cache-routing-plugins.yaml"
      pluginsCustomConfig:
        precise-prefix-cache-routing-plugins.yaml: |
          apiVersion: llm-d.ai/v1alpha1
          kind: EndpointPickerConfig
          plugins:
            - type: token-producer
              parameters:
                modelName: Qwen/Qwen3-32B # Must match the render Service model and the deployed model server
                vllm:
                  url: "http://localhost:8000" # EPP tokenizer sidecar (loopback)
            - type: endpoint-notification-source
            - type: precise-prefix-cache-producer
              parameters:
                tokenProcessorConfig:
                  blockSize: 64
                # Predicted cache entries to keep back-to-back same-prefix
                # requests sticky before the confirming KVEvent arrives (2s TTL).
                # Set to false to rely only on confirmed events.
                speculativeIndexing: true
                indexerConfig:
                  kvBlockIndexConfig:
                    enableMetrics: true
                kvEventsConfig:
                  topicFilter: "kv@"
                  concurrency: 8
                  discoverPods: true
                  podDiscoveryConfig:
                    socketPort: 5556
            - type: prefix-cache-scorer
              parameters:
                prefixMatchInfoProducerName: precise-prefix-cache-producer
            - type: kv-cache-utilization-scorer
            - type: queue-scorer
            - type: no-hit-lru-scorer
              parameters:
                prefixMatchInfoProducerName: precise-prefix-cache-producer
          dataLayer: # metrics-data-source + core-metrics-extractor injected by default
            sources:
              - pluginRef: endpoint-notification-source
                extractors:
                  - pluginRef: precise-prefix-cache-producer
          schedulingProfiles:
            - name: default
              plugins:
                - pluginRef: kv-cache-utilization-scorer
                  weight: 2.0
                - pluginRef: queue-scorer
                  weight: 2.0
                - pluginRef: prefix-cache-scorer
                  weight: 3.0
                - pluginRef: no-hit-lru-scorer
                  weight: 2.0

    extraServicePorts:
      - name: http
        port: 80
        protocol: TCP
        targetPort: 8081

    modelServers:
      type: vllm
      targetPorts:
        - number: 8000
      matchLabels:
        llm-d.ai/guide: "precise-prefix-cache-routing"

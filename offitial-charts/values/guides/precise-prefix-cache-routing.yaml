## precise-prefix-cache-routing guide overrides for the router.
## Port of guides/precise-prefix-cache-routing/router/precise-prefix-cache-routing.values.yaml
##
## Layer on top of: values/base.values.yaml
##
## Two namespaces below:
##   eppPlugins.*  — this chart's templated EndpointPickerConfig
##   llmd.*        — passed through to oci://ghcr.io/llm-d/charts/llm-d-router-gateway
##
## Tokenization is served by a standalone `vllm launch render` Service (from the
## llm-d-modelserver chart), NOT the chart-injected EPP sidecar. To use a
## sidecar instead, add -f values/features/tokenizer-sidecar.yaml.

eppPlugins:
  enabled: true

  model:
    # Must match the render Service model and the deployed model servers.
    name: Qwen/Qwen3-32B

  tokenizer:
    # Empty => http://<llm-d.ai/guide>-render:8000, the Service the
    # llm-d-modelserver chart creates.
    url: ""

  precisePrefixCache:
    enabled: true
    # Must match vLLM `--block-size`.
    blockSize: 64
    speculativeIndexing: true
    enableMetrics: true
    kvEvents:
      topicFilter: "kv@"
      concurrency: 8
      discoverPods: true
      socketPort: 5556

  scoring:
    weights:
      kvCacheUtilization: 2.0
      queue: 2.0
      prefixCache: 3.0
      noHitLru: 2.0

llmd:
  router:
    epp:
      ## Pod-discovery mode with active-active HA (replicas: 2). Each replica
      ## dials every vLLM pod's per-pod ZMQ socket; both indexes converge.
      ## Scale to a single replica with --set llmd.router.epp.replicas=1.
      replicas: 2
      flags:
        # The chart auto-adds `--ha-enable-leader-election` when replicas > 1,
        # which makes only the leader's readiness probe pass — collapsing to
        # active-passive. Embedding `=false` into the key forces the single-arg
        # form (pflag won't parse `--key value` as a bool); pflag honors
        # last-occurrence wins. No-op when replicas=1.
        ha-enable-leader-election: false

      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN

      # Point the EPP at the ConfigMap this chart generates, overriding the
      # "default-plugins.yaml" set in base.values.yaml. The ".." escapes the
      # upstream chart's hardcoded "/config/" prefix.
      pluginsConfigFile: "../llmd-plugins/plugins.yaml"

    extraServicePorts:
      - name: http
        port: 80
        protocol: TCP
        targetPort: 8081

    modelServers:
      type: vllm
      targetPorts:
        - number: 8000
      # Selects the InferencePool members AND determines the render Service URL
      # (http://<guide>-render:8000). Must match the modelserver chart's
      # `guideLabel`.
      matchLabels:
        llm-d.ai/guide: "precise-prefix-cache-routing"

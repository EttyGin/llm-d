## Self-contained small-cluster config: precise prefix cache + flow control,
## Qwen2.5-0.5B, single EPP replica. For minikube / CPU smoke runs.
##
## NOT upstream — the model name, single replica and maxConcurrency=4 are
## scaled-down values, not benchmarked. Use INSTEAD of the precise/flowcontrol
## guide file (it is a complete config, not a patch on top of one).
##
##   helm install ppc charts/llm-d-router \
##     -f values/base.values.yaml \
##     -f values/guides/cpu-smoke.yaml \
##     -f values/features/httproute-flags.yaml \
##     -n $NAMESPACE

llmd:
  router:
    tokenizer:
      modelName: Qwen/Qwen2.5-0.5B-Instruct  # sidecar tokenizes the small model
    epp:
      replicas: 1
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN
      resources:
        requests:
          cpu: "300m"
          memory: 768Mi
        limits:
          memory: 2Gi
      pluginsConfigFile: "cpu-smoke-plugins.yaml"
      pluginsCustomConfig:
        cpu-smoke-plugins.yaml: |
          apiVersion: llm-d.ai/v1alpha1
          kind: EndpointPickerConfig
          featureGates:
            - flowControl
          plugins:
            - type: token-producer
              parameters:
                modelName: Qwen/Qwen2.5-0.5B-Instruct
                vllm:
                  url: "http://localhost:8000" # EPP tokenizer sidecar (loopback)
            - type: endpoint-notification-source
            - type: precise-prefix-cache-producer
              parameters:
                tokenProcessorConfig:
                  blockSize: 64
                speculativeIndexing: true
                indexerConfig:
                  kvBlockIndexConfig:
                    enableMetrics: true
                kvEventsConfig:
                  topicFilter: "kv@"
                  concurrency: 8
                  discoverPods: true
                  podDiscoveryConfig:
                    socketPort: 5556
            - type: prefix-cache-scorer
              parameters:
                prefixMatchInfoProducerName: precise-prefix-cache-producer
            - type: kv-cache-utilization-scorer
            - type: queue-scorer
            - type: no-hit-lru-scorer
              parameters:
                prefixMatchInfoProducerName: precise-prefix-cache-producer
            - type: round-robin-fairness-policy
            - type: fcfs-ordering-policy
            - type: concurrency-detector
              parameters:
                maxConcurrency: 4
                concurrencyMode: requests
                headroom: 0.0
          dataLayer:
            sources:
              - pluginRef: endpoint-notification-source
                extractors:
                  - pluginRef: precise-prefix-cache-producer
          schedulingProfiles:
            - name: default
              plugins:
                - pluginRef: kv-cache-utilization-scorer
                  weight: 2.0
                - pluginRef: queue-scorer
                  weight: 2.0
                - pluginRef: prefix-cache-scorer
                  weight: 3.0
                - pluginRef: no-hit-lru-scorer
                  weight: 2.0
          flowControl:
            maxBytes: "10Gi"
            maxRequests: "1k"
            defaultRequestTTL: "60s"
            saturationDetector:
              pluginRef: concurrency-detector
            priorityBands:
              - priority: 100
                maxRequests: "32"
                fairnessPolicyRef: round-robin-fairness-policy
                orderingPolicyRef: fcfs-ordering-policy
              - priority: 0
                maxRequests: "16"
                fairnessPolicyRef: round-robin-fairness-policy
                orderingPolicyRef: fcfs-ordering-policy
              - priority: -10
                maxRequests: "4"
                fairnessPolicyRef: round-robin-fairness-policy
                orderingPolicyRef: fcfs-ordering-policy

    inferenceObjectives:
      - name: premium-traffic
        priority: 100
      - name: standard-traffic
        priority: 0
      - name: best-effort-traffic
        priority: -10

    extraServicePorts:
      - name: http
        port: 80
        protocol: TCP
        targetPort: 8081

    modelServers:
      type: vllm
      targetPorts:
        - number: 8000
      matchLabels:
        llm-d.ai/guide: "precise-prefix-cache-routing"

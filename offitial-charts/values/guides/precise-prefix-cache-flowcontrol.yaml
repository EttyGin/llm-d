## Precise Prefix Cache Routing + Flow Control — ONE combined EPP config.
##
## The EPP `pluginsConfigFile` selects a SINGLE config, and pluginsCustomConfig
## is a map keyed by filename — so precise-prefix and flow-control cannot be
## layered as two separate -f files (only one file is ever active). Upstream
## solves this the same way (guides/workload-autoscaling/keda-epp/router.values.yaml
## puts flowControl + the scorers in one config); this file is that combined
## config for the precise path.
##
## Use INSTEAD of values/guides/precise-prefix-cache-routing.yaml:
##   helm install ppc charts/llm-d-router \
##     -f values/base.values.yaml \
##     -f values/guides/precise-prefix-cache-flowcontrol.yaml \
##     -f values/features/httproute-flags.yaml \
##     -n $NAMESPACE

llmd:
  router:
    epp:
      replicas: 2
      flags:
        ha-enable-leader-election: false
      env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-d-hf-token
              key: HF_TOKEN

      pluginsConfigFile: "precise-prefix-cache-flowcontrol-plugins.yaml"
      pluginsCustomConfig:
        precise-prefix-cache-flowcontrol-plugins.yaml: |
          apiVersion: llm-d.ai/v1alpha1
          kind: EndpointPickerConfig
          featureGates:
            - flowControl
          plugins:
            - type: token-producer
              parameters:
                modelName: Qwen/Qwen3-32B
                vllm:
                  url: "http://localhost:8000" # EPP tokenizer sidecar (loopback)
            - type: endpoint-notification-source
            - type: precise-prefix-cache-producer
              parameters:
                tokenProcessorConfig:
                  blockSize: 64
                speculativeIndexing: true
                indexerConfig:
                  kvBlockIndexConfig:
                    enableMetrics: true
                kvEventsConfig:
                  topicFilter: "kv@"
                  concurrency: 8
                  discoverPods: true
                  podDiscoveryConfig:
                    socketPort: 5556
            - type: prefix-cache-scorer
              parameters:
                prefixMatchInfoProducerName: precise-prefix-cache-producer
            - type: kv-cache-utilization-scorer
            - type: queue-scorer
            - type: no-hit-lru-scorer
              parameters:
                prefixMatchInfoProducerName: precise-prefix-cache-producer
            # Flow control policies. concurrency-detector is preferred over the
            # default utilization-detector in production (no telemetry lag).
            - type: round-robin-fairness-policy
            - type: fcfs-ordering-policy
            - type: concurrency-detector
              parameters:
                maxConcurrency: 132 # calibrate: replicas x per-replica max concurrency
                concurrencyMode: requests
                headroom: 0.0
          dataLayer:
            sources:
              - pluginRef: endpoint-notification-source
                extractors:
                  - pluginRef: precise-prefix-cache-producer
          schedulingProfiles:
            - name: default
              plugins:
                - pluginRef: kv-cache-utilization-scorer
                  weight: 2.0
                - pluginRef: queue-scorer
                  weight: 2.0
                - pluginRef: prefix-cache-scorer
                  weight: 3.0
                - pluginRef: no-hit-lru-scorer
                  weight: 2.0
          flowControl:
            # No shedding: every request queues until backend capacity frees up,
            # nothing is rejected with 429. maxRequests: 0 = unlimited (count),
            # defaultRequestTTL: "0s" = wait for the client deadline (no TTL-based
            # 503). maxBytes stays as an EPP-memory OOM guardrail only. Priority
            # still orders dispatch OUT of the queue — prioritisation without
            # load-shedding. Defaults per configuration.md (maxBytes/maxRequests
            # 0 = unlimited, TTL 0s = client context deadline).
            maxBytes: "10Gi"
            maxRequests: 0
            defaultRequestTTL: "0s"
            saturationDetector:
              pluginRef: concurrency-detector
            priorityBands:
              - priority: 100
                maxRequests: 0
                fairnessPolicyRef: round-robin-fairness-policy
                orderingPolicyRef: fcfs-ordering-policy
              - priority: 0
                maxRequests: 0
                fairnessPolicyRef: round-robin-fairness-policy
                orderingPolicyRef: fcfs-ordering-policy
              - priority: -10
                maxRequests: 0
                fairnessPolicyRef: round-robin-fairness-policy
                orderingPolicyRef: fcfs-ordering-policy

    # Priorities must line up with the priorityBands above; clients select a
    # band via the `x-llm-d-inference-objective` header. Rendered as
    # InferenceObjective CRs (installed by scripts/install-crds.sh).
    inferenceObjectives:
      - name: premium-traffic
        priority: 100
      - name: standard-traffic
        priority: 0
      - name: best-effort-traffic
        priority: -10

    # NOTE: only the http:80 port here. The chart already exposes http-metrics
    # on 9090 unconditionally; adding a second 9090 makes the Service invalid.
    extraServicePorts:
      - name: http
        port: 80
        protocol: TCP
        targetPort: 8081

    modelServers:
      type: vllm
      targetPorts:
        - number: 8000
      matchLabels:
        llm-d.ai/guide: "precise-prefix-cache-routing"

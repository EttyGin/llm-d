## Base values shared by every model server overlay.
## Port of guides/recipes/modelserver/base/single-host/default/decode-deployment.yaml
##
## Layer an accelerator/engine overlay on top:
##   helm install ppc charts/llm-d-modelserver \
##     -f values/modelserver/base.values.yaml \
##     -f values/modelserver/gpu-vllm.yaml \
##     -n $NAMESPACE

# Selector label pairing model servers with the router's InferencePool. Must
# match router.modelServers.matchLabels in the router values.
guideLabel: precise-prefix-cache-routing

hfTokenSecret:
  name: llm-d-hf-token
  key: HF_TOKEN

decode:
  enabled: true
  port: 8000
  kvEvents:
    enabled: true
    port: 5556
    # Must match router epp.llmd.precisePrefixCache.blockSize.
    blockSize: 64
  startupProbe:
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 120
  livenessProbe:
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

# Standalone `vllm launch render` tokenizer Service.
# Port of guides/precise-prefix-cache-routing/render/
render:
  enabled: true
  replicas: 3
  image:
    repository: docker.io/vllm/vllm-openai-cpu
    tag: v0.23.0
    pullPolicy: IfNotPresent
  port: 8000
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 12Gi

monitoring:
  podMonitor:
    enabled: false
    interval: 30s
    path: /metrics

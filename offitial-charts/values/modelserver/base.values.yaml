## Base values shared by every model server overlay.
##
## The decode Deployment's spec comes ENTIRELY from a `decode.spec` block that
## mirrors the upstream patch-vllm.yaml — see any of the accelerator overlays.
## Because Helm replaces (does not merge) lists, each accelerator overlay
## carries a COMPLETE decode.spec, exactly like each kustomize overlay carries a
## complete patch-vllm.yaml. This base only holds the non-spec, shared bits.
##
##   helm install ppc-ms charts/llm-d-modelserver \
##     -f values/modelserver/base.values.yaml \
##     -f values/modelserver/gpu-vllm.yaml \
##     -n $NAMESPACE

# InferencePool selector — must match the router's modelServers.matchLabels.
guideLabel: precise-prefix-cache-routing

hfTokenSecret:
  enabled: true
  name: llm-d-hf-token
  key: HF_TOKEN

# Standalone render (tokenizer) Service. Port of
# guides/precise-prefix-cache-routing/render/.
render:
  enabled: true
  replicas: 3
  image:
    repository: docker.io/vllm/vllm-openai-cpu
    tag: v0.23.0
    pullPolicy: IfNotPresent
  port: 8000
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 12Gi

monitoring:
  podMonitor:
    enabled: false
    interval: 30s
    path: /metrics

## Small-cluster overlay: 1 replica, 1 GPU, tiny model.
##
## NOT an upstream configuration — upstream has no small-cluster profile for
## this guide. The sizing here is a scaled-down starting point, not a
## benchmarked one. The nearest upstream reference is the Intel XPU overlay,
## which uses Qwen3-0.6B for CI.
##
## Layer LAST so it wins over the accelerator overlay:
##   helm install ppc charts/llm-d-modelserver \
##     -f values/modelserver/base.values.yaml \
##     -f values/modelserver/gpu-vllm.yaml \
##     -f values/modelserver/smoke-test.yaml \
##     -n $NAMESPACE
##
## Pair with values/guides/smoke-test.yaml on the router side so the model name
## and saturation threshold match.

model:
  name: Qwen/Qwen3-0.6B
  label: Qwen3-0.6B

decode:
  replicas: 1
  tensorParallelSize: 1
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
      nvidia.com/gpu: 1
    limits:
      cpu: "4"
      memory: 16Gi
      nvidia.com/gpu: 1
  shmSize: 2Gi

render:
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

## NVIDIA GPU with llm-d's OWN vLLM build (llm-d-cuda), RHEL UBI9, release-matched.
## Same decode.spec as gpu-vllm.yaml, only the image differs. See
## docs/api-reference/artifacts.md -> Custom Images (also -gb200, -aws variants).
## Confirm the exact tag at https://github.com/llm-d/llm-d/pkgs/container/llm-d-cuda

model:
  name: Qwen/Qwen3-32B
  label: Qwen3-32B

accelerator:
  variant: gpu
  vendor: nvidia

decode:
  enabled: true
  spec:
    replicas: 8
    template:
      spec:
        containers:
          - name: modelserver
            image: ghcr.io/llm-d/llm-d-cuda:v0.8.1
            imagePullPolicy: IfNotPresent
            command: ["vllm", "serve"]
            args:
              - Qwen/Qwen3-32B
              - --disable-access-log-for-endpoints=/health,/metrics,/v1/models
              - --tensor-parallel-size=2
              - --block-size=64                       # MUST match router blockSize
              - --kv-events-config
              - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"$(KV_EVENTS_ENDPOINT)","topic":"kv@$(POD_IP):$(POD_PORT)@Qwen/Qwen3-32B"}'
            ports:
              - containerPort: 5556
                name: kv-events
                protocol: TCP
              - containerPort: 8000
                name: modelserver
                protocol: TCP
            env:
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: llm-d-hf-token
                    key: HF_TOKEN
              - name: NAMESPACE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
              - name: POD_IP
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
              - name: POD_PORT
                value: "8000"
              - name: KV_EVENTS_ENDPOINT
                value: "tcp://*:5556"
              - name: DO_NOT_TRACK
                value: "1"
              - name: USER                            # gpu-vllm image component (vllm#44548)
                value: llm-d
            resources:
              limits:
                cpu: '16'
                memory: 128Gi
                nvidia.com/gpu: 2
              requests:
                cpu: '8'
                memory: 96Gi
                nvidia.com/gpu: 2
            volumeMounts:
              - mountPath: /dev/shm
                name: shm
              - mountPath: /.cache
                name: torch-compile-cache
              - mountPath: /.triton
                name: triton-cache
              - mountPath: /.config
                name: vllm-config
            startupProbe:
              initialDelaySeconds: 15
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 120
              httpGet:
                path: /v1/models
                port: modelserver
            livenessProbe:
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
              httpGet:
                path: /health
                port: modelserver
            readinessProbe:
              periodSeconds: 5
              timeoutSeconds: 2
              failureThreshold: 3
              httpGet:
                path: /v1/models
                port: modelserver
        volumes:
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 20Gi
          - name: torch-compile-cache
            emptyDir: {}
          - name: triton-cache
            emptyDir: {}
          - name: vllm-config
            emptyDir: {}

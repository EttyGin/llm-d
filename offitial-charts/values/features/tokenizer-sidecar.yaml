## Tokenization topology: `vllm launch render` as a SIDECAR in the EPP pod
## (loopback), so EPP and tokenizer share one pod — instead of a standalone
## render Service.
##
## Officially supported — docs/architecture/advanced/kv-management/
## prefix-cache-aware-routing.md: "typically a `vllm launch render` sidecar in
## the EPP pod (loopback) or a shared render Service".
##
## Apply to BOTH the router and modelserver releases. Pair the model server
## with a PRODUCTION accelerator overlay (e.g. values/modelserver/gpu-vllm.yaml),
## not the CPU smoke overlay.
##
## Sidecar vs. Service: the sidecar removes a Deployment, a Service and a
## network hop from the TTFT path, at the cost of pinning render capacity 1:1 to
## EPP replicas. Fine for production when EPP replica count already tracks
## tokenization load; use the Service when they must scale independently.

## ---- llm-d-router ----
eppPlugins:
  tokenizer:
    # Loopback to the in-pod sidecar rather than the render Service.
    url: "http://localhost:8000"

llmd:
  router:
    tokenizer:
      enabled: true
      # Required — positional arg to `vllm launch render`. Keep in sync with
      # eppPlugins.model.name and the model the servers actually serve.
      modelName: Qwen/Qwen3-32B
      image:
        # Production image pinning. Point registry/repository at your own
        # registry (mirror / air-gapped) as needed, e.g.
        #   registry: my-registry.example.com
        #   repository: vllm/vllm-openai-cpu
        #
        # The tokenizer only tokenizes (no weights, no GPU), so the GPU-less
        # `vllm-openai-cpu` image is the correct production choice AND lets the
        # EPP pod schedule on a plain CPU node. Only switch to the full
        # `vllm/vllm-openai` image if you deliberately co-locate the EPP pod on
        # a GPU node and want a single image across the fleet — the CUDA image
        # can fail to import on a node with no GPU.
        registry: docker.io
        repository: vllm/vllm-openai-cpu
        # The upstream chart default is v0.19.1; pin to the same vLLM release
        # the model servers run so tokenizer and serving never drift.
        tag: v0.23.0
        pullPolicy: IfNotPresent
      port: 8000
      # Production sizing for the sidecar. Tokenization is CPU-bound and
      # bursty; this is per EPP replica.
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          memory: 12Gi

## ---- llm-d-modelserver ----
## The standalone render pool is redundant once the sidecar is on.
render:
  enabled: false

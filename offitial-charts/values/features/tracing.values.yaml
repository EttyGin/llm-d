## Enables distributed tracing (OpenTelemetry) for the router.
## Port of guides/recipes/router/features/tracing.values.yaml
## Update the endpoint and sampling values for your environment.

## ---- llm-d-router ----
llmd:
  router:
    tracing:
      enabled: true
      otelExporterEndpoint: "http://otel-collector:4317"
      sampling:
        sampler: "parentbased_traceidratio"
        samplerArg: "0.05"

## ---- llm-d-modelserver ----
## decode is now patch-shaped (decode.spec verbatim), so there is no
## decode.tracing knob. To trace the model server, add these two args and the
## endpoint env directly in your decode.spec container:
##   args:
##     - --otlp-traces-endpoint=http://otel-collector:4317
##     - --collect-detailed-traces=all

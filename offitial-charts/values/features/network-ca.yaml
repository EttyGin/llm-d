## Trust a network's TLS-interception CA (corporate / content-filter proxy).
##
## On networks that MITM outbound HTTPS (e.g. a Netspark/etrog content filter),
## the model server's weight download fails with:
##   httpx.ConnectError: [SSL: CERTIFICATE_VERIFY_FAILED]
##     certificate verify failed: self-signed certificate in certificate chain
##
## This is NOT circumvention — it makes the pod trust the CA the network
## operator already installed on managed hosts, so TLS verification passes for
## the content the filter permits. Blocked content stays blocked.
##
## Prerequisite: a ConfigMap in the namespace holding a CA bundle that includes
## both the public roots and the interception CA chain, e.g.
##
##   # extract the interception chain
##   openssl s_client -showcerts -connect us.aws.cdn.hf.co:443 \
##     -servername us.aws.cdn.hf.co </dev/null 2>/dev/null \
##     | awk '/BEGIN CERT/,/END CERT/' > net-ca.pem
##   cat /etc/ssl/certs/ca-certificates.crt net-ca.pem > combined-ca.pem
##   kubectl create configmap network-ca-bundle -n $NAMESPACE \
##     --from-file=ca-bundle.crt=combined-ca.pem
##
## Then apply this file to the modelserver release.

## ---- llm-d-modelserver ----
## decode is patch-shaped, so mount the CA directly in your decode.spec:
##   containers:
##     - name: modelserver
##       env:
##         - { name: SSL_CERT_FILE,       value: /etc/ssl/network-ca/ca-bundle.crt }
##         - { name: REQUESTS_CA_BUNDLE,  value: /etc/ssl/network-ca/ca-bundle.crt }
##       volumeMounts:
##         - { name: network-ca, mountPath: /etc/ssl/network-ca, readOnly: true }
##   volumes:
##     - name: network-ca
##       configMap: { name: network-ca-bundle }
##
## The render Service still takes extraVolumes/extraVolumeMounts structurally:
render:
  extraVolumes:
    - name: network-ca
      configMap:
        name: network-ca-bundle
  extraVolumeMounts:
    - name: network-ca
      mountPath: /etc/ssl/network-ca
      readOnly: true

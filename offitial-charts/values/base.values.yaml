## Base values shared by every llm-d Router deployment.
## Port of guides/recipes/router/base.values.yaml (llm-d v0.8.1).
##
## Layer guide- and feature-specific overrides on top with additional -f flags:
##
##   helm install ppc charts/llm-d-router \
##     -f values/base.values.yaml \
##     -f values/guides/precise-prefix-cache-routing.yaml \
##     -f values/guides/flow-control.yaml \
##     -f values/features/httproute-flags.yaml \
##     -n $NAMESPACE
llmd:
  router:
    epp:
      replicas: 1
      flags:
        v: 2
      pluginsConfigFile: "default-plugins.yaml"
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          memory: 16Gi

    inferencePool:
      failureMode: "FailOpen"

    modelServers:
      protocol: http # http, grpc

    proxy:
      # CLI args for the Envoy sidecar. Overrides the chart's defaults of
      # `--log-level trace` (very expensive under load) and no `--concurrency`
      # (Envoy spawns ~hardware_concurrency() worker threads, oversubscribing the
      # cgroup's CPU slice). `--concurrency 8` matches the resource limits below.
      #
      # NOTE: inert in Gateway mode (proxy.enabled=false) — the Gateway's own
      # proxy handles the data plane. Kept here to mirror upstream, which shares
      # this file between the standalone and gateway charts.
      args:
        - "--service-node"
        - "envoy-sidecar"
        - "--log-level"
        - "warn"
        - "--concurrency"
        - "8"
        - "--drain-strategy"
        - "immediate"
        - "--drain-time-s"
        - "60"
        - "-c"
        - "/etc/envoy/envoy.yaml"
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          memory: 16Gi

    tracing:
      otelExporterEndpoint: "http://localhost:4317"
      sampling:
        sampler: "parentbased_traceidratio"
        samplerArg: "0.1"

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.gateway.name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- if .Values.gateway.enableInferenceExtProc }}
    # Tells Istio to attach the GAIE ext-proc filter for InferencePool backends.
    istio.io/enable-inference-extproc: "true"
    {{- end }}
    {{- with .Values.gateway.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gateway.className | quote }}
  {{- if .Values.infrastructure.enabled }}
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: {{ .Values.gateway.name }}
  {{- end }}
  listeners:
    {{- toYaml .Values.gateway.listeners | nindent 4 }}

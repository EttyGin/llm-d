{{- if .Values.decode.enabled }}
{{- $d := .Values.decode }}
{{- /*
  The chart owns ONLY what the upstream kustomize base + labels transformer own:
  metadata, the guide labels (InferencePool selector), the selector, the pod
  template labels, and the ServiceAccount. Everything under `decode.spec` is
  YOUR patch — laid out exactly like guides/.../modelserver/gpu/vllm/base/
  patch-vllm.yaml's `spec:` block, and rendered verbatim. Nothing in it is
  templated by the chart, so you keep full kustomize-style control.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-d-modelserver.name" . }}-decode
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-d-modelserver.labels" . | nindent 4 }}
    {{- include "llm-d-modelserver.decodeSelectorLabels" . | nindent 4 }}
spec:
  replicas: {{ dig "spec" "replicas" 1 $d }}
  selector:
    matchLabels:
      {{- include "llm-d-modelserver.decodeSelectorLabels" . | nindent 6 }}
  {{- with dig "spec" "strategy" dict $d }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "llm-d-modelserver.decodeSelectorLabels" . | nindent 8 }}
        {{- with dig "spec" "template" "metadata" "labels" dict $d }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with dig "spec" "template" "metadata" "annotations" dict $d }}
      annotations:
        {{- range $k, $v := . }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      {{- end }}
    spec:
      # Chart-injected (kustomize base owns this). Override by putting
      # serviceAccountName in decode.spec.template.spec.
      serviceAccountName: {{ include "llm-d-modelserver.serviceAccountName" . }}
      {{- /* Your patch's spec.template.spec, verbatim. */}}
      {{- omit (dig "spec" "template" "spec" dict $d) "serviceAccountName" | toYaml | nindent 6 }}
{{- end }}

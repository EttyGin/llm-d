{{- if .Values.decode.enabled }}
{{- $d := .Values.decode }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-d-modelserver.name" . }}-decode
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-d-modelserver.labels" . | nindent 4 }}
    {{- include "llm-d-modelserver.decodeSelectorLabels" . | nindent 4 }}
  {{- with $d.deploymentAnnotations }}
  annotations:
    {{- range $k, $v := . }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
spec:
  replicas: {{ $d.replicas }}
  selector:
    matchLabels:
      {{- include "llm-d-modelserver.decodeSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llm-d-modelserver.decodeSelectorLabels" . | nindent 8 }}
        {{- with $d.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $d.annotations }}
      annotations:
        {{- range $k, $v := . }}
        {{ $k }}: {{ $v | quote }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "llm-d-modelserver.serviceAccountName" . }}
      {{- with $d.podSecurityContext }}
      # Pod-level security context. To run as root (e.g. for images that write
      # outside the mounted emptyDirs), set runAsUser/runAsGroup/fsGroup to 0
      # and runAsNonRoot: false.
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $d.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: modelserver
          image: "{{ $d.image.repository }}:{{ $d.image.tag }}"
          imagePullPolicy: {{ $d.image.pullPolicy }}
          {{- with $d.securityContext }}
          # Container-level security context.
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["vllm", "serve"]
          args:
            - "{{ .Values.model.name }}"
            - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
            - "--tensor-parallel-size={{ $d.tensorParallelSize }}"
            # MUST match the router's epp.llmd.precisePrefixCache.blockSize.
            - "--block-size={{ $d.kvEvents.blockSize }}"
            {{- if $d.kvEvents.enabled }}
            - "--kv-events-config"
            - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"$(KV_EVENTS_ENDPOINT)","topic":"kv@$(POD_IP):$(POD_PORT)@{{ .Values.model.name }}"}'
            {{- end }}
            {{- if $d.tracing.enabled }}
            - "--otlp-traces-endpoint={{ $d.tracing.otlpEndpoint }}"
            - "--collect-detailed-traces={{ $d.tracing.detailedTraces }}"
            {{- end }}
          {{- with $d.extraArgs }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: modelserver
              containerPort: {{ $d.port }}
              protocol: TCP
            {{- if $d.kvEvents.enabled }}
            # Each router replica dials this per-pod ZMQ socket directly.
            - name: kv-events
              containerPort: {{ $d.kvEvents.port }}
              protocol: TCP
            {{- end }}
          env:
            {{- if .Values.hfTokenSecret.enabled }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hfTokenSecret.name }}
                  key: {{ .Values.hfTokenSecret.key }}
            {{- end }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            # Used in the kv-events topic so pods are keyed by their inference
            # endpoint; must equal the modelserver container port.
            - name: POD_PORT
              value: {{ $d.port | quote }}
            {{- if $d.kvEvents.enabled }}
            # Bind per-pod so every router replica can subscribe independently
            # (required for active-active EPP HA).
            - name: KV_EVENTS_ENDPOINT
              value: "tcp://*:{{ $d.kvEvents.port }}"
            {{- end }}
            # vLLM usage telemetry writes to /.config, which fails under
            # restricted SecurityContexts (e.g. OpenShift).
            - name: DO_NOT_TRACK
              value: "1"
            # Workaround for vllm-project/vllm#44548 (torch 2.11, vLLM >= 0.20).
            # Applied by the gpu-vllm image component upstream.
            - name: USER
              value: llm-d
            {{- with $d.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml $d.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            {{- toYaml $d.startupProbe | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: modelserver
            {{- toYaml $d.livenessProbe | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            {{- toYaml $d.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            # HF downloads, JIT / torch-compile caches. The images do not set
            # $HOME, so under a restricted SecurityContext (random non-root UID,
            # e.g. OpenShift) ~/ resolves to the non-writable "/".
            - name: cache
              mountPath: /.cache
            # Triton kernel autotune cache — same reason.
            - name: triton-cache
              mountPath: /.triton
            # Usage-telemetry writes land in /.config.
            - name: vllm-config
              mountPath: /.config
            {{- with $d.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ $d.shmSize }}
        - name: cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: vllm-config
          emptyDir: {}
        {{- with $d.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $d.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $d.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $d.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

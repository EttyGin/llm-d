{{- if .Values.eppPlugins.enabled }}
{{- $p := .Values.eppPlugins -}}
{{- $ppc := $p.precisePrefixCache | default dict -}}
{{- $fc := $p.flowControl | default dict -}}
{{- $w := $p.scoring.weights | default dict -}}
{{- /*
  token-producer talks to the render endpoint. Default to the guide-label
  naming the llm-d-modelserver chart uses (and that upstream's kustomize
  namePrefix produces): <guide>-render:8000. Deriving it from the guide label
  rather than the release name means the two charts agree even under different
  release names — the guide label already has to match for the InferencePool
  selector to work.
*/ -}}
{{- $guide := "" -}}
{{- with .Values.llmd.router.modelServers.matchLabels -}}
{{- $guide = index . "llm-d.ai/guide" | default "" -}}
{{- end -}}
{{- $renderURL := $p.tokenizer.url -}}
{{- if not $renderURL -}}
{{- if not $guide -}}
{{- fail "eppPlugins.tokenizer.url must be set when llmd.router.modelServers.matchLabels has no llm-d.ai/guide label" -}}
{{- end -}}
{{- $renderURL = printf "http://%s-render:8000" $guide -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  # Fixed name (not release-derived): the subchart mounts this via
  # llmd.router.epp.volumes, and Helm cannot template subchart values.
  # Keep in sync with llmd.router.epp.volumes[].configMap.name in values.yaml.
  name: {{ $p.configMapName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "llm-d-router.name" . }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  {{ $p.fileName }}: |
    # Generated by charts/llm-d-router from .Values.eppPlugins.
    # This is NOT a Kubernetes CRD — it is the EPP binary's config file format
    # (llm-d.ai/v1alpha1), read once at startup from --config-file.
    # Changing it requires restarting the EPP; there is no controller reconcile.
    apiVersion: llm-d.ai/v1alpha1
    kind: EndpointPickerConfig
    {{- if $fc.enabled }}
    featureGates:
    - flowControl
    {{- end }}
    plugins:
    - type: token-producer
      parameters:
        # MUST match the model served by the render endpoint and model servers.
        modelName: {{ $p.model.name | quote }}
        vllm:
          url: {{ $renderURL | quote }}
    {{- if $ppc.enabled }}
    - type: endpoint-notification-source
    - type: precise-prefix-cache-producer
      parameters:
        tokenProcessorConfig:
          # MUST match vLLM `--block-size`.
          blockSize: {{ $ppc.blockSize | default 64 }}
        {{- /* `| default true` would force true even when explicitly set to
               false (Helm treats false as empty). hasKey respects an explicit
               false while still defaulting when the key is absent. */}}
        speculativeIndexing: {{ if hasKey $ppc "speculativeIndexing" }}{{ $ppc.speculativeIndexing }}{{ else }}true{{ end }}
        indexerConfig:
          kvBlockIndexConfig:
            enableMetrics: {{ if hasKey $ppc "enableMetrics" }}{{ $ppc.enableMetrics }}{{ else }}true{{ end }}
        kvEventsConfig:
          topicFilter: {{ $ppc.kvEvents.topicFilter | default "kv@" | quote }}
          concurrency: {{ $ppc.kvEvents.concurrency | default 8 }}
          discoverPods: {{ if hasKey $ppc.kvEvents "discoverPods" }}{{ $ppc.kvEvents.discoverPods }}{{ else }}true{{ end }}
          podDiscoveryConfig:
            socketPort: {{ $ppc.kvEvents.socketPort | default 5556 }}
    - type: prefix-cache-scorer
      parameters:
        prefixMatchInfoProducerName: precise-prefix-cache-producer
    {{- else }}
    - type: prefix-cache-scorer
    {{- end }}
    - type: kv-cache-utilization-scorer
    - type: queue-scorer
    {{- if $ppc.enabled }}
    - type: no-hit-lru-scorer
      parameters:
        prefixMatchInfoProducerName: precise-prefix-cache-producer
    {{- end }}
    {{- if $fc.enabled }}
    - type: {{ $fc.fairnessPolicy | default "round-robin-fairness-policy" }}
    - type: {{ $fc.orderingPolicy | default "fcfs-ordering-policy" }}
    - type: {{ $fc.saturationDetector.type | default "concurrency-detector" }}
    {{- with $fc.saturationDetector.parameters }}
      parameters:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- end }}
    {{- with $p.extraPlugins }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $ppc.enabled }}
    dataLayer:
      # metrics-data-source + core-metrics-extractor are injected by the EPP.
      sources:
      - pluginRef: endpoint-notification-source
        extractors:
        - pluginRef: precise-prefix-cache-producer
    {{- end }}
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: kv-cache-utilization-scorer
        weight: {{ $w.kvCacheUtilization | default 2.0 }}
      - pluginRef: queue-scorer
        weight: {{ $w.queue | default 2.0 }}
      - pluginRef: prefix-cache-scorer
        weight: {{ $w.prefixCache | default 3.0 }}
      {{- if $ppc.enabled }}
      - pluginRef: no-hit-lru-scorer
        weight: {{ $w.noHitLru | default 2.0 }}
      {{- end }}
      {{- with $p.extraSchedulingPlugins }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
    {{- if $fc.enabled }}
    flowControl:
      maxBytes: {{ $fc.maxBytes | default "10Gi" | quote }}
      maxRequests: {{ $fc.maxRequests | default "1k" | quote }}
      defaultRequestTTL: {{ $fc.defaultRequestTTL | default "60s" | quote }}
      saturationDetector:
        pluginRef: {{ $fc.saturationDetector.type | default "concurrency-detector" }}
      priorityBands:
      {{- range $fc.priorityBands }}
      - priority: {{ .priority }}
        maxRequests: {{ .maxRequests | quote }}
        fairnessPolicyRef: {{ $fc.fairnessPolicy | default "round-robin-fairness-policy" }}
        orderingPolicyRef: {{ $fc.orderingPolicy | default "fcfs-ordering-policy" }}
      {{- end }}
    {{- end }}
{{- end }}

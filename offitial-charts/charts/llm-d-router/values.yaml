# llm-d Router — chart defaults.
#
# This chart is a THIN WRAPPER over the official llm-d chart:
#   oci://ghcr.io/llm-d/charts/llm-d-router-gateway  (see Chart.yaml)
#
# It adds NO templates of its own. Everything under `llmd:` is passed straight
# through to the official subchart, so these values mirror the upstream chart's
# own value hierarchy exactly — just nested one level under `llmd:` (the
# dependency alias). The EPP configuration is supplied the upstream way, via
# `llmd.router.epp.pluginsCustomConfig`, identical in shape to the values files
# under guides/<path>/router/*.values.yaml in the llm-d repo.
#
# To move to a new upstream release: bump `version` in Chart.yaml, `make deps`.
# To update a guide config: copy the upstream guide's `router:` block into the
# matching file under values/guides/, nested under `llmd:`.
#
# Real configuration comes from the layered values tree:
#   helm install ppc charts/llm-d-router \
#     -f values/base.values.yaml \
#     -f values/guides/precise-prefix-cache-routing.yaml \
#     -f values/features/httproute-flags.yaml \
#     -n $NAMESPACE

# ---------------------------------------------------------------------------
# Passed through verbatim to oci://ghcr.io/llm-d/charts/llm-d-router-gateway.
# Keys and nesting match that chart's own values.yaml.
# ---------------------------------------------------------------------------
llmd:
  provider:
    name: istio # none | istio | gke
    istio:
      destinationRule:
        host: ""
        trafficPolicy: {}

  httpRoute:
    # Enabled by values/features/httproute-flags.yaml (Gateway mode).
    create: false
    inferenceGatewayName: llm-d-inference-gateway
    inferenceGatewayNamespace: ""
    requestTimeout: "300s"

  router:
    modelServers:
      type: vllm
      protocol: http
      targetPorts:
        - number: 8000
      # Placeholder so the chart renders standalone; the guide overlay is
      # authoritative.
      matchLabels:
        llm-d.ai/guide: "precise-prefix-cache-routing"

    inferencePool:
      create: true
      failureMode: "FailOpen"

    inferenceObjectives: []

    epp:
      image:
        registry: ghcr.io/llm-d
        repository: llm-d-router-endpoint-picker
        tag: v0.9.0
        pullPolicy: IfNotPresent

      replicas: 1

      # Stock upstream default. A guide overlay selects its own config file and
      # supplies it under pluginsCustomConfig (the upstream mechanism).
      pluginsConfigFile: "default-plugins.yaml"
      pluginsCustomConfig: {}

    tokenizer:
      enabled: false

    # Gateway mode: the Gateway's proxy handles the data plane.
    proxy:
      enabled: false

    monitoring:
      interval: "10s"
      prometheus:
        enabled: false
        auth:
          enabled: true

    tracing:
      enabled: false

    latencyPredictor:
      enabled: false

# =============================================================================
# Reproduces guides/precise-prefix-cache-routing on top of the umbrella chart.
#
#   helm install my-llm-d . -n <ns> -f my-values.yaml \
#                                   -f examples/values-precise-prefix-cache-routing.yaml
#
# Precise (exact) prefix-cache routing: the EPP indexes real vLLM kv-cache events
# (ZMQ :5556) for exact prefix matching. This is where kv-events lives — the
# generic base chart has none of it. It is turned on in the model server via the
# additive extraArgs/extraEnv knobs (no need to restate decode.spec).
#
# ⚠ Set `_model` below AND the token-producer `modelName` to the SAME value as
#   identity.model in your base file (a literal block can't use the YAML anchor).
# =============================================================================
_model: &m Qwen/Qwen3-32B

llm-d-modelserver:
  decode:
    extraArgs:
      - --block-size=64
      - --kv-events-config
      - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"$(KV_EVENTS_ENDPOINT)","topic":"kv@$(POD_IP):$(POD_PORT)@$(MODEL_NAME)"}'
    extraEnv:
      - name: MODEL_NAME
        value: *m
      - name: POD_IP
        valueFrom:
          fieldRef:
            fieldPath: status.podIP
      - name: POD_PORT
        value: "8000"
      - name: KV_EVENTS_ENDPOINT
        value: "tcp://*:5556"    # vLLM binds the kv-events ZMQ socket here

llm-d-router:
  llmd:
    router:
      # Precise routing tokenizes requests → the EPP tokenizer sidecar is required.
      tokenizer:
        enabled: true
      epp:
        replicas: 2
        flags:
          ha-enable-leader-election: false
        pluginsConfigFile: "precise-prefix-cache-routing-plugins.yaml"
        pluginsCustomConfig:
          precise-prefix-cache-routing-plugins.yaml: |
            apiVersion: llm-d.ai/v1alpha1
            kind: EndpointPickerConfig
            plugins:
              - type: token-producer
                parameters:
                  modelName: Qwen/Qwen3-32B  # ⚠ keep == identity.model
                  vllm:
                    url: "http://localhost:8000"  # EPP tokenizer sidecar (loopback)
              - type: endpoint-notification-source
              - type: precise-prefix-cache-producer
                parameters:
                  tokenProcessorConfig:
                    blockSize: 64
                  speculativeIndexing: true
                  indexerConfig:
                    kvBlockIndexConfig:
                      enableMetrics: true
                  kvEventsConfig:
                    topicFilter: "kv@"
                    concurrency: 8
                    discoverPods: true
                    podDiscoveryConfig:
                      socketPort: 5556
              - type: prefix-cache-scorer
                parameters:
                  prefixMatchInfoProducerName: precise-prefix-cache-producer
              - type: kv-cache-utilization-scorer
              - type: queue-scorer
              - type: no-hit-lru-scorer
                parameters:
                  prefixMatchInfoProducerName: precise-prefix-cache-producer
            dataLayer:
              sources:
                - pluginRef: endpoint-notification-source
                  extractors:
                    - pluginRef: precise-prefix-cache-producer
            schedulingProfiles:
              - name: default
                plugins:
                  - pluginRef: kv-cache-utilization-scorer
                    weight: 2.0
                  - pluginRef: queue-scorer
                    weight: 2.0
                  - pluginRef: prefix-cache-scorer
                    weight: 3.0
                  - pluginRef: no-hit-lru-scorer
                    weight: 2.0
